<!DOCTYPE html>
<html>
<head>
    <title>Mini Platformer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 2px solid #555; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 400;

// Настройки игры
const gravity = 0.8;
const keys = {};

const player = {
    x: 50, y: 300, w: 30, h: 30,
    dy: 0, speed: 5, jumpForce: 12,
    grounded: false, color: '#00ffcc'
};

const platforms = [
    { x: 0, y: 380, w: 800, h: 20 },   // Пол
    { x: 200, y: 280, w: 150, h: 15 }, // Платформы
    { x: 450, y: 200, w: 150, h: 15 },
    { x: 100, y: 150, w: 100, h: 15 }
];

// Управление
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    // Движение по горизонтали
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

    // Прыжок
    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.grounded) {
        player.dy = -player.jumpForce;
        player.grounded = false;
    }

    // Гравитация
    player.dy += gravity;
    player.y += player.dy;
    player.grounded = false;

    // Проверка столкновений с платформами
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y < p.y + p.h && player.y + player.h > p.y) {
            
            // Если падаем сверху на платформу
            if (player.dy > 0 && player.y + player.h - player.dy <= p.y) {
                player.y = p.y - player.h;
                player.dy = 0;
                player.grounded = true;
            }
        }
    });

    // Границы экрана
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;
    
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Рисуем платформы
    ctx.fillStyle = '#777';
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // Рисуем игрока
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.w, player.h);
}

update();
</script>
</body>
</html>
